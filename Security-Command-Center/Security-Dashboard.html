<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Docmee - Security Command Center</title>
<style>
:root{
  --bg:#0a0e16; --bg2:#0e1320; --panel:#121a28; --panel2:#0f1622;
  --border:#22304a; --border2:#2c3d5c;
  --text:#e8eef8; --muted:#8a9bb8; --muted2:#5d6f8e;
  --sec:#f87171; --sec-dim:#3a1414; --accent:#38bdf8;
  --done:#34d399; --doing:#fbbf24; --todo:#3a4a63;
  --crit:#f87171; --high:#fb923c; --med:#fbbf24; --low:#34d399; --info:#60a5fa;
  --shadow:0 8px 30px rgba(0,0,0,.45);
  --r:14px;
}
*{box-sizing:border-box}
html,body{margin:0;background:
   radial-gradient(1200px 600px at 80% -10%, #2a1420 0%, transparent 55%),
   radial-gradient(900px 500px at -10% 10%, #13203a 0%, transparent 50%),
   var(--bg);color:var(--text);
   font-family:"Segoe UI",system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
   -webkit-font-smoothing:antialiased}
a{color:var(--accent);text-decoration:none}
.wrap{max-width:1320px;margin:0 auto;padding:26px 26px 70px}
header.top{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:18px}
.brand{display:flex;align-items:center;gap:14px}
.logo{width:46px;height:46px;border-radius:12px;background:linear-gradient(135deg,var(--sec),#b91c1c);
  display:grid;place-items:center;font-weight:800;font-size:22px;color:#0b0606;box-shadow:var(--shadow)}
.brand h1{font-size:22px;margin:0;letter-spacing:.3px}
.brand .sub{color:var(--muted);font-size:13px;margin-top:3px;max-width:620px;line-height:1.4}
.meta{text-align:right;font-size:12px;color:var(--muted)}
.meta .pill{display:inline-block;margin:2px 0 2px 6px;padding:4px 10px;border:1px solid var(--border2);
  border-radius:20px;background:var(--panel);color:var(--text)}
.meta .live{color:var(--sec)}
.arbar{margin-top:8px;display:inline-flex;gap:6px;align-items:center}
.arbtn{font:inherit;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--border2);
  background:var(--panel);color:var(--text);border-radius:20px;padding:4px 11px}
.arbtn:hover{border-color:var(--accent)}
.arbtn.on{color:var(--done);border-color:var(--done)} .arbtn.off{color:var(--muted)}
.arcd{font-size:11px;color:var(--muted2);min-width:90px;text-align:left}

/* banners */
.banner{border-radius:12px;padding:12px 16px;margin-bottom:14px;font-size:13px;border:1px solid;display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap}
.banner.warn{background:#2a2410;border-color:#5a4a16;color:#f6d36b}
.banner.ok{background:#0f2a1e;border-color:#1f5a3e;color:#7fe0b0}
.banner b{color:var(--text)}

/* nav */
nav.tabs{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0 22px;border-bottom:1px solid var(--border);padding-bottom:0}
nav.tabs button{background:none;border:none;color:var(--muted);font:inherit;font-size:14px;font-weight:600;
  padding:11px 16px;cursor:pointer;border-bottom:2px solid transparent;border-radius:8px 8px 0 0}
nav.tabs button:hover{color:var(--text);background:var(--panel2)}
nav.tabs button.active{color:var(--text);border-bottom-color:var(--sec)}
nav.tabs .cnt{font-size:11px;color:var(--muted2);margin-left:6px}

/* kpi strip */
.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:22px}
.kpi{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--border);
  border-radius:var(--r);padding:15px 16px}
.kpi .v{font-size:26px;font-weight:800;line-height:1}
.kpi .l{color:var(--muted);font-size:12px;margin-top:7px;letter-spacing:.2px}
.kpi .s{color:var(--muted2);font-size:11px;margin-top:3px}

/* panels */
.grid{display:grid;gap:16px}
.panel{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--border);
  border-radius:var(--r);padding:18px 20px;box-shadow:var(--shadow)}
.panel h2{font-size:15px;margin:0 0 4px;letter-spacing:.3px}
.panel h2 .tag{font-size:11px;font-weight:600;color:var(--muted);margin-left:8px}
.panel .desc{color:var(--muted);font-size:12.5px;margin:0 0 16px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.hidden{display:none}.muted{color:var(--muted)}
.foot{color:var(--muted2);font-size:11px;text-align:center;margin-top:40px;line-height:1.7}

/* chips */
.chip{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.c-crit{background:#3a1414;color:var(--crit)} .c-high{background:#3a2410;color:var(--high)}
.c-med{background:#3a3410;color:var(--med)} .c-low{background:#0f3024;color:var(--low)}
.c-info{background:#15233f;color:var(--info)}
.c-ok{background:#0f3024;color:var(--done)} .c-pend{background:#1b2740;color:var(--muted)}
.c-action{background:#3a1414;color:var(--sec)} .c-watch{background:#3a3410;color:var(--doing)} .c-holds{background:#0f3024;color:var(--done)}

/* confidence badge */
.conf{display:inline-flex;align-items:center;gap:5px;font-weight:800;font-size:12px;padding:3px 10px;border-radius:20px;border:1px solid}
.conf .n{font-size:13px}
.conf-hi{background:#0f3024;color:var(--done);border-color:#1f5a3e}
.conf-mid{background:#3a3410;color:var(--doing);border-color:#5a4a16}
.conf-lo{background:#3a1414;color:var(--crit);border-color:#5a2020}

/* finding card */
.finding{background:var(--panel2);border:1px solid var(--border);border-left:4px solid var(--muted2);
  border-radius:12px;padding:16px 18px;margin-bottom:14px}
.finding.sev-Critical{border-left-color:var(--crit)} .finding.sev-High{border-left-color:var(--high)}
.finding.sev-Medium-High{border-left-color:var(--med)} .finding.sev-Medium{border-left-color:var(--med)}
.finding.sev-Low{border-left-color:var(--low)} .finding.sev-Info{border-left-color:var(--info)}
.fhead{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.fid{font-size:12px;font-weight:800;letter-spacing:.5px;color:var(--accent);background:#0e1830;border:1px solid var(--border2);padding:2px 8px;border-radius:7px}
.ftitle{font-size:15px;font-weight:700}
.spacer{flex:1}
.fmeta{font-size:11.5px;color:var(--muted2);margin:8px 0 14px;display:flex;gap:12px;flex-wrap:wrap}
.fmeta b{color:var(--muted)}
.quad{display:grid;grid-template-columns:1fr 1fr;gap:12px 22px}
.quad .q h5{margin:0 0 4px;font-size:11px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted)}
.quad .q.threat h5{color:var(--high)} .quad .q.blast h5{color:var(--crit)}
.quad .q.cause h5{color:var(--doing)} .quad .q.sol h5{color:var(--done)}
.quad .q p{margin:0;font-size:12.8px;line-height:1.5;color:var(--text)}
.faction{margin-top:14px;font-size:12.5px;background:#0e1830;border:1px solid var(--border2);border-radius:8px;padding:9px 12px;color:var(--text)}
.faction b{color:var(--accent)}

/* tables */
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{text-align:left;color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.6px;
  padding:9px 10px;border-bottom:1px solid var(--border2);position:sticky;top:0;background:var(--panel)}
td{padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:top}
tr.clk{cursor:pointer} tr.clk:hover td{background:var(--panel2)}
.scroll{max-height:520px;overflow:auto;border:1px solid var(--border);border-radius:12px}
.detail td{background:var(--panel2)}

/* charts */
.charts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.donutcard{text-align:center}.donutcard h3{font-size:13px;margin:0 0 10px}
.dlegend{font-size:11px;color:var(--muted);text-align:left;margin-top:10px;line-height:1.8}
.dlegend b{color:var(--text)}
.dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:6px;vertical-align:middle}
.filelist{font-size:11px;color:var(--muted);font-family:"Cascadia Code",Consolas,monospace;line-height:1.6;margin-top:4px}

@media(max-width:1100px){.kpis{grid-template-columns:repeat(3,1fr)}.charts,.three{grid-template-columns:1fr}.two{grid-template-columns:1fr}.quad{grid-template-columns:1fr}}
@media(max-width:640px){.kpis{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand">
      <div class="logo">S</div>
      <div>
        <h1>Docmee - Security Command Center</h1>
        <div class="sub" id="tagline"></div>
      </div>

  <div id="banners"></div>

</div>

": "Mitigated (locked)", "assessment": "holds", "confidence": 9, "phase": "0", "threat": "A flaw in row-level-security scoping (or an admin carve-out used wrongly) leaks one clinic's PHI to another - the worst-case multi-tenant failure.", "blast": "Catastrophic: all clinics' PHI exposed/crossed.", "cause": "Multi-tenant single-DB with RLS; risk lives in any code path that bypasses clinic context.", "solution": "Design is strong and locked, and now declared in code: packages/db/src/index.ts defines withClinicContext() as the RLS chokepoint (SET LOCAL app.clinic_id) with the raw pool kept PRIVATE to the package and a single audited withAdminContext() as the only cross-tenant door; rls.test.ts scaffolds the isolation tests. Sustain it by keeping those RLS/tenant-isolation tests mandatory and green in CI (Phase 0) - the control is only as good as the test that proves no path skips it.", "action": "Keep RLS isolation tests as a blocking CI gate; alert if the lint rule or tests are disabled."}, {"id": "SEC02", "source": "tracker", "category": "Encryption / Keys", "owner": "Prime", "title": "Master encryption key compromise", "severity": "Critical", "tracker_status": "Mitigated (locked)", "assessment": "holds", "confidence": 8, "phase": "0", "threat": "Compromise of the master encryption key exposes all PHI at rest.", "blast": "Catastrophic: all PHI at rest.", "cause": "Single master key protects field-level encryption; its custody is the crux.", "solution": "Locked and sound: Supabase Vault + envelope encryption + key_version rotation + host-store fallback, with restricted key access and rotate-on-suspicion (X8). Verify the access restriction is actually enforced and document/drill the rotation runbook so it works under pressure.", "action": "Confirm key-access least-privilege in prod and rehearse the X8 rotation runbook."}, {"id": "SEC06", "source": "tracker", "category": "Third-Party / Data Egress", "owner": "Prime + Legal", "title": "PHI sent to third-party LLM / ASR p  rest, outside RLS and outside the app's audit trail.", "cause": "Single-VPS deployment with backups not yet hardened. No confirmed encryption-at-rest for backups, access control, or tested recovery (tracked as X12, explicitly required before real patients).", "solution": "Implement X12 before the Pilot Gate: encrypt backups at rest (separate key from the live envelope key), store off-host with least-privilege access, log every access, and run a tested restore drill. Treat 'tested recovery' as a hard gate item, not a checkbox.", "action": "Land X12 (encrypted, access-controlled, restore-tested backups) and make it a blocking Pilot-Launch-Gate criterion."}, {"id": "SEC04", "source": "tracker", "category": "Third-Party / Transport", "owner": "Prime", "title": "PHI through unofficial WhatsApp gateway (Evolution)", "severity": "High", "tracker_status": "Mitigated (interim); cutover planned", "assessment": "action", "confidence": 9, "phase": "1A / 2B", "threat": "Routing patient messages through the unofficial Evolution gateway places PHI in transit through software outside Meta's official, supported path - higher risk of interception, instability, or account action, and weaker security assurances than the Cloud API.", "blast": "High: WhatsApp PHI in transit for every clinic still on the interim gateway.", "cause": "Evolution is a deliberate, bounded interim to unblock WhatsApp before official Meta Cloud API onboarding completes per clinic.", "solution": "Keep the interim strictly bounded and supervised, and execute the per-clinic cutover to the official Meta Cloud API (R7, X9/X10) on a defined timeline. Track each clinic's cutover state; do not let 'interim' become permanent.", "action": "Hold the cutover schedule (X9/X10) and surface per-clinic gateway status so no clinic runs on Evolution past its bound."}, {"id": "SEC07", "source": "tracker", "category": "Auth / Access", "owner": "Prime", "title": "RBAC enforced only in UI (privilege escalation)", "severity": "High", "tracker_status": "Mitigated (locked)", "assessment": "holds", "confidence": 9, "phase": "2A", "threat": "If roles are enforced only in the UI, a user can call the API directly and act beyond their role (within-clinic over-access).", "blast": "Medium: within-clinic privilege escalation.", "cause": "UI-only checks are cosmetic; the API is the real trust boundary.", "solution": "Locked correctly (G18): enforce the 5-role matrix at the API/DAL, not the UI. Back it with per-role API tests that assert forbidden calls are rejected server-side.", "action": "Ensure G18 ships with negative (forbidden-call) RBAC tests when 2A lands."}, {"id": "SEC09", "source": "tracker", "category": "Network / Transport", "owner": "Prime", "title": "Webhook spoofing (unverified inbound)", "severity": "High", "tracker_status": "Mitigated (locked)", "assessment": "holds", "confidence": 9, "phase": "0 / 1A", "threat": "Forged inbound webhooks inject fake messages/events if signatures are not verified.", "blast": "Medium: injected messages per clinic.", "cause": "Public webhook endpoints accept unauthenticated POSTs unless cryptographically verified.", "solution": "Locked (G06): Meta HMAC signature verification with constant-time compare + verify-challenge. Ensure missing/invalid signatures are rejected before any processing (ties to SEC18 early-drop) and that the compare is genuinely constant-time.", "action": "Add a test asserting unsigned/badly-signed webhooks are rejected pre-processing."}, {"id": "SEC03", "source": "tracker", "category": "Encryption / Keys", "owner": "Prime", "title": "HMAC lookup-key leak (identity correlation)", "severity": "High", "tracker_status": "Mitigated (locked)", "assessment": "holds", "confidence": 8, "phase": "0", "threat": "Leak of the HMAC key used for blind-index lookups lets an attacker correlate/confirm patient identities even without decrypting fields.", "blast": "High: patient identity correlation across the dataset.", "cause": "Deterministic lookup keys sistant audit log (SEC19) and alert on use.", "action": "Verify impersonation events are audited and alertable when 2A lands."}, {"id": "SEC10", "source": "tracker", "category": "Application / Bot", "owner": "Prime", "title": "Bot unauthorized data writes", "severity": "High", "tracker_status": "Mitigated (locked)", "assessment": "holds", "confidence": 8, "phase": "1A", "threat": "The bot writes/edits/deletes records it should not, corrupting patient data.", "blast": "Medium: a single patient record per incident.", "cause": "Autonomous write capability is dangerous without hard constraints.", "solution": "Locked (D24): field-level DAL allowlist (validated, logged, NO deletes), confidence-gated, secretary-wins. Keep deletes impossible for the bot and log every write for review.", "action": "No action; confirm the no-delete + allowlist invariants are covered by tests when 1A lands."}, {"id": "SEC11", "source": "tracker", "category": "Encryption / Keys / Secrets", "owner": "Prime", "title": "Secrets exposure (env / boot)", "severity": "High", "tracker_status": "Mitigated (locked)", "assessment": "holds", "confidence": 8, "phase": "0", "threat": "Secrets leaking via env dumps, logs, or committed config give attackers infra credentials.", "blast": "High: infrastructure credentials.", "cause": "Apps need secrets at boot; sloppy handling (logging env, committing .env) leaks them.", "solution": "Locked (G05) and now confirmed in code: packages/core/src/env.ts validates the process env with zod, keeps only connection secrets in env, pulls the master key from Vault with a host fallback, and fail-fasts in production (JWT_SECRET + DATABASE_URL required). Reinforce with CI secret-scanning (pairs with SEC22), a pre-commit secret scan, and raising the JWT_SECRET minimum (see CODE-05).", "action": "Add CI secret-scanning (e.g. gitleaks); env.ts already enforces fail-fast + secrets-only env at boot."}, {"id": "SEC12", "source": "tracker", "category": "Third-Party / OAuth", "owner": "Prime", "title": "OAuth token theft (Google Calendar / Meta)", "severity": "High", "tracker_status": "Mitigated (locked)", "assessment": "holds", "confidence": 8, "phase": "1C / 2B", "threat": "Stolen OAuth tokens give an attacker a clinic's calendar/page access.", "blast": "Medium: a single clinic's calendar/page per stolen token.", "cause": "Long-lived integration tokens are high-value if stored in the clear.", "solution": "Locked: encrypted token storage (envelope), refresh/revocation handling, and disconnect alerts (1C/2B). Ensure revocation actually invalidates stored tokens and that disconnect alerts fire.", "action": "Verify token revocation + disconnect-alert paths when 1C/2B land."}, {"id": "SEC16", "source": "tracker", "category": "Compliance / Logging", "owner": "Prime + Alpha", "title": "PHI in logs / URLs", "severity": "Medium-High", "tracker_status": "Open - build-time discipline", "assessment": "action", "confidence": 9, "phase": "all", "threat": "PHI leaking into application logs, error traces, or URL query strings. Logs are widely readable (ops, aggregators, third-party log SaaS) and URLs end up in browser history, proxies, and referer headers - turning a low-privilege surface into a PHI disclosure.", "blast": "Medium and cross-cutting: anyone with log access, plus any intermediary that sees URLs. Grows with every new endpoint and log line that is not disciplined.", "cause": "A sanctioned redacting logger now exists (packages/core/src/logger.ts - pino with redact paths for password/token/authorization/secret/phone/content/body/email/special_notes/raw_payload, plus a no-console lint), which closes the biggest gap. Residual: redaction covers only top-level and one-level-nested keys (paths = key and *.key), so deeply-nested PHI, PHI inside arrays, PHI passed as a free-text log message, and PHI in URLs/query strings are still not covered structurally.", "solution": "Build on the new logger rather than start over: (1) extend redaction to arbitrary depth/arrays (pino wildcard paths or a serializer that walks objects) - see CODE-04; (2) keep all identifiers out of URLs/query strings and add a CI/lint check for PHI-in-URL; (3) enforce by review that raw patient content is never the log message, since key-based redaction cannot catch free-text. The logger + no-console lint is a strong base and meaningfully reduces this from where it was.", "action": "Deepen logger redaction (CODE-04) + add a PHI-in-URL CI check; the core redaction control already landed in logger.ts (62bae10)."}, {"id": "SEC13", "source": "tracker", "category": "Infrastructure", "owner": "Ops", "title": "Single-VPS host compromise", "severity": "Medium-High", "tracker_status": "Partial - hardening needed", "assessment": "action", "confidence": 8, "phase": "0 / Pilot Gate", "threat": "Everything runs on one VPS: API, worker, DB, keys. Host compromise (unpatched service, weak SSH, over-broad privileges) yields the entire deployment - app controls and RLS are irrelevant once you own the box.", "blast": "Catastrophic for the deployment: all clinics, all PHI, all keys on a single host.", "cause": "Single-node topology (redundancy deferred to X13) with host hardening only partially done.", "solution": "Harden now even though redundancy is later: least-privilege OS users, locked-down SSH (keys only, no root login), automated patch management, a host firewall exposing only 443, and encrypted backups (X12). Plan the second node / redundancy (X13, R8) post-pilot, but the hardening is a pilot prerequisite.", "action": "Complete host hardening + patch automation before pilot; keep X13 redundancy on the post-pilot roadmap."}, {"id": "SEC17", "source": "tracker", "category": "Auth / Session", "owner": "Prime + Alpha", "title": "JWT / session security", "severity": "Medium-High", "tracker_status": "Locked (scope) + build discipline", "assessment": "action", "confidence": 8, "phase": "0", "threat": "Weak session handling - long-lived or broadly-scoped JWTs, tokens readable by client JS, no rotation/revocation on role change - lets a stolen token be replayed for its full lifetime, escalating a single XSS or leak into sustained account access.", "blast": "Medium: a single user/clinic session per stolen token; broader if many tokens share a weakness.", "cause": "Real credential exchange is not built yet (Sprint-0 is mock-first). The scaffold already does the right things (HS256, 8h expiry, clinicId only from the token, generic 401), but token storage and revocation are still to land - see CODE-01.", "solution": "When real /auth/login lands in Phase 0: set the session cookie server-side as HttpOnly + Secure + SameSite (so JS cannot read it - closes CODE-01), keep JWTs short-lived and scoped, rotate on privilege change, and add a revocation path (deny-list or short TTL + refresh). The verify/claims discipline already in token.ts is a good base.", "action": "At Phase-0 real auth: move the token to a server-set HttpOnly cookie and add rotate/revoke-on-role-change."}, {"id": "SEC20", "source": "tracker", "category": "Compliance", "owner": "Prime + staff", "title": "Cross-channel merge PHI mixing", "severity": "Medium-High", "tracker_status": "Mitigated (manual)", "assessment": "holds", "confidence": 8, "phase": "2B", "threat": "Auto-merging conversations across channels could fuse two different patients' PHI into one record.", "blast": "Medium: two patients' data mixed per bad merge.", "cause": "Identity matching across channels is error-prone if automated.", "solution": "Mitigated (D37): manual-only merge, audited, with a confirmation step. Reversible merge is the right follow-up (FI6). Keep merges human-confirmed and logged.", "action": "No action; track FI6 (reversible merge) for when volume grows."}, {"id": "SEC23", "source": "tracker", "category": "Compliance", "owner": "Prime", "title": "Proactive-messaging compliance / WhatsApp number reputation", "severity": "Medium-High", "tracker_status": "Mitigated (six-gate) for transactional", "assessment": "holds", "confidence": 8, "phase": "2C", "threat": "Unconstrained proactive messages risk policy violations and can get a clinic's WhatsApp number throttled or banned - losing the whole channel.", "blast": "Medium-high: a clinic's entire messaging channel.", "cause": "Proactive outbound at scale is exactly what messaging platforms police.", "solution": "Mitigated by the six-gate model at the chokepoint (opt-out, approved-template, timing, state-valid, frequency-cap, clinic-enabled), transactional-only in 2C, marketing deferred behind explicit opt-in (D39). Keep marketing gated and the six-gate non-bypassable.", "action": "No action; six-gate/idempotency tests are mandatory in 2C - keep them blocking."}, {"id": "SEC24", "source": "tracker", "category": "Compliance / Egress", "owner": "Prime", "title": "External data egress (Sheets / CRM export)", "severity": "Medium-High", "tracker_status": "Mitigated (clinic-authorized + audited)", "assessment": "holds", "confidence": 8, "phase": "3C", "threat": "Exporting patient data to external Sheets/CRM moves PHI outside the platform's controls.", "blast": "Medium-high: patient data outside the platform per export.", "cause": "Egress is a deliberate feature; the risk is scope and authorization.", "solution": "Mitigated: clinic-authorized fields only, per-clinic encrypted OAuth creds (G49), egress audited + revocable (G48), aggregates/scoped where possible. Keep egress opt-in per field and fully audited.", "action": "No action; verify G48/G49 audit + revoke paths when 3C lands."}, {"id": "R9", "source": "risk", "category": "Risk Register", "owner": "", "title": "Document ingestion expands Phase 1A scope", "severity": "Medium-High", "tracker_status": "Open — mitigated (text-layer, off-the-shelf libs, OCR→3C); fallback end-1A/early-1B", "assessment": "watch", "confidence": 7, "phase": "", "threat": "Doc-ingestion scope risk; mitigated to text-layer, off-the-shelf - monitor scope creep.", "blast": "", "cause": "", "solution": "Doc-ingestion scope risk; mitigated to text-layer, off-the-shelf - monitor scope creep.", "action": "", "lightweight": true}, {"id": "SEC22", "source": "tracker", "category": "Supply Chain", "owner": "Prime + Alpha", "title": "Dependency / supply-chain vulnerability", "severity": "Medium", "tracker_status": "Open - recommended", "assessment": "action", "confidence": 9, "phase": "Sprint 0+", "threat": "A vulnerable or malicious npm/pip dependency (or a compromised Evolution gateway build) executes code in the API/worker - the supply-chain route to RCE and credential/PHI theft that bypasses every app-layer control.", "blast": "Medium-to-high: a transitive dep running in the API process inherits its secrets and DB access. With a single VPS, that is effectively host-level.", "cause": "No automated vulnerability scanning or update cadence wired into CI yet. Lockfiles exist (pnpm-lock.yaml present - good) but are not yet paired with audit gating or Dependabot, and the Evolution version is not pinned/vetted.", "solution": "Cheap, high-value, and actionable today: add `pnpm audit` / `pip audit` to CI as a failing gate on high/critical, enable Dependabot (or Renovate) with a review cadence, pin and periodically re-vet the Evolution gateway version, and consider provenance checks. This is the lowest-effort item with real RCE-class payoff.", "action": "Wire dependency vuln-scanning into .github/workflows/ci.yml and enable automated update PRs this sprint."}, {"id": "SEC15", "source": "tracker", "category": "Compliance", "owner": "Prime", "title": "Messaging opted-out patients", "severity": "Medium", "tracker_status": "Mitigated (locked)", "assessment": "holds", "confidence": 9, "phase": "1A / 2C", "threat": "Sending messages to opted-out patients is a compliance violation and erodes trust/number reputation.", "blast": "Low-medium: compliance exposure.", "cause": "Opt-out must be enforced at the single outbound point, not per-feature.", "solution": "Locked (D05): outbound chokepoint suppression that is bot-irreversible. Keep all outbound paths funneled through the chokepoint - no feature may send around it.", "action": "No action; ensure new outbound features route through the chokepoint (architecture lint)."}, {"id": "SEC18", "source": "tracker", "category": "Network / Availability", "owner": "Prime", "title": "API rate limiting / DoS", "severity": "Medium", "tracker_status": "Open - recommended", "assessment": "action", "confidence": 8, "phase": "Pilot Gate", "threat": "No per-source rate limiting means a flood of requests or junk webhooks can exhaust the single VPS, and unauthenticated webhook endpoints can be abused to drive queue/work amplification - an availability (and cost) attack.", "blast": "Medium: availability of the whole single-node deployment; degraded service for every clinic at once.", "cause": "Rate limiting and webhook early-drop are not yet implemented; the architecture is single-VPS so there is no upstream shield.", "solution": "Add per-source rate limiting at the edge/app, drop invalid webhooks before signature-heavy work (cheap checks first), and apply queue backpressure so a spike cannot unbounded-grow the worker backlog. Scope for the Pilot Launch Gate (SEC18 is already slated there).", "action": "Implement per-source rate limiting + webhook early-drop as a Pilot-Gate item."}, {"id": "SEC19", "source": "tracker", "category": "Audit / Logging", "owner": "Prime", "title": "Audit completeness & tamper-resistance", "severity": "Medium", "tracker_status": "Mitigated (locked pattern)", "assessment": "holds", "confidence": 8, "phase": "all", "threat": "Incomplete or mutable audit logs undermine forensics and accountability after an incident.", "blast": "Low directly, but it caps your ability to investigate every other incident.", "cause": "Audit logs are only useful if append-only, complete, and access-controlled.", "solution": "Locked pattern: append-only, time-stamped, actor-stamped, immutable storage, access-controlled. Ensure the security-relevant events (impersonation, key rotation, egress, merges) all write to it.", "action": "Confirm high-risk actions (SEC08/SEC20/SEC24) emit audit events."}, {"id": "R3", "source": "risk", "category": "Compliance / Legal", "owner": "Clinic + Docmee", "title": "Legal docs (privacy policy, terms, Spanish)", "severity": "Medium", "tracker_status": "Open - clinic-owned; Docmee supplies templates", "assessment": "action", "confidence": 8, "phase": "Pilot Gate", "threat": "Operating a PHI-handling platform without a published privacy policy / terms (in Spanish for Guatemala) is a direct legal/compliance exposure and undermines consent capture (G63).", "blast": "Medium: regulatory/legal exposure across all clinics on the platform; blocks lawful processing.", "cause": "Legal docs are clinic-owned but not yet produced; consent flows reference them.", "solution": "Docmee should supply Spanish-language privacy-policy and terms templates and make publishing them a Pilot-Gate prerequisite for each clinic. Tie consent capture (G63) to the published policy.", "action": "Ship the Spanish legal templates and gate pilot onboarding on a published policy."}, {"id": "R8", "source": "risk", "category": "Infrastructure / Availability", "owner": "Ops", "title": "Single-VPS = single point of failure", "severity": "Medium", "tracker_status": "Redundancy deferred (X13); backups REQUIRED", "assessment": "action", "confidence": 8, "phase": "Pilot Gate / post-pilot", "threat": "One VPS means any host failure (hardware, disk, bad deploy) takes down all clinics, and without solid backups a disk loss is unrecoverable PHI loss.", "blast": "High: full-deployment outage; with weak backups, permanent data loss.", "cause": "Single-node topology chosen for pilot economics; redundancy deferred to X13.", "solution": "Accept the deferral but make backups non-negotiable before pilot (overlaps SEC14): encrypted, off-host, restore-tested. Put X13 (redundancy/second node) on the immediate post-pilot roadmap and define an RTO/RPO.", "action": "Make tested backups a Pilot-Gate blocker; schedule X13 redundancy for post-pilot with a stated RTO/RPO."}, {"id": "CODE-01", "source": "code", "category": "Auth / Session (XSS)", "owner": "Alpha + Prime", "title": "Session token in a non-HttpOnly cookie (JS-readable)", "severity": "Medium", "tracker_status": "Scaffold - Sprint-0 mock", "assessment": "action", "confidence": 8, "phase": "0", "file": "monorepo/apps/web/src/lib/auth.ts", "threat": "The session bearer token is written via document.cookie (apps/web/src/lib/auth.ts setToken), so the cookie is NOT HttpOnly and is readable by any JavaScript. A single XSS anywhere in the panel can exfiltrate the token and replay the session for its 8h lifetime. Cross-references SEC17.", "blast": "Medium: one user/clinic session per stolen token; systemic if an XSS affects many users.", "cause": "Sprint-0 is mock-first with no server credential exchange, so the token is set client-side - and a client-set cookie cannot be HttpOnly by definition. The code does do SameSite=Lax + Secure-in-prod, which is good but does not stop same-origin JS from reading it.", "solution": "When the real /auth/login lands (Phase 0), issue the cookie from the server with HttpOnly + Secure + SameSite=Lax/Strict and a Set-Cookie response, so JS can never read it. Until then, treat the JS-readable token as an accepted scaffold limitation and keep the panel XSS-clean (React escaping by default; avoid dangerouslySetInnerHTML). This is the concrete server-side fix behind SEC17.", "action": "At Phase-0 real auth, switch setToken to a server-set HttpOnly Set-Cookie; remove client-side token writes."}, {"id": "CODE-04", "source": "code", "category": "Logging / PHI (SEC16)", "owner": "Prime", "title": "Log redaction covers only shallow keys (one level deep)", "severity": "Medium", "tracker_status": "Scaffold - new at 62bae10", "assessment": "action", "confidence": 8, "phase": "0", "file": "monorepo/packages/core/src/logger.ts", "threat": "The sanctioned pino logger redacts sensitive keys only at the top level and one level of nesting (REDACT_PATHS = `key` and `*.key`). PHI nested deeper (a patient object inside a payload inside an event), inside arrays, or passed as the free-text log message is NOT redacted and will be written in clear. This is the residual half of SEC16 after the good redaction work in this commit.", "blast": "Medium: PHI in logs for any path that logs deep/nested structures or raw message strings; readable by anyone with log/aggregator access.", "cause": "pino redact paths are explicit and shallow here, and key-name redaction by design cannot catch PHI embedded inside a message string.", "solution": "Extend redaction to arbitrary depth and arrays (additional pino wildcard paths or a custom serializer that walks objects before logging), and enforce by convention/review that raw patient content is never passed as the log message. Add a unit test that logs a deeply-nested PHI object and asserts every sensitive field is `[redacted]`. The existing logger is the right foundation - this just hardens its depth.", "action": "Deepen logger redaction beyond one level + add a redaction unit test for nested/array PHI."}, {"id": "R7", "source": "risk", "category": "Risk Register", "owner": "", "title": "Unofficial WhatsApp gateway (Evolution) for interim/live traffic", "severity": "Medium", "tracker_status": "Accepted — bounded by interim use + supervision; prompt X10 cutover", "assessment": "action", "confidence": 8, "phase": "", "threat": "Bounded by interim use + supervision; cutover to Meta Cloud API (see SEC04).", "blast": "", "cause": "", "solution": "Bounded by interim use + supervision; cutover to Meta Cloud API (see SEC04).", "action": "", "lightweight": true}, {"id": "SEC21", "source": "tracker", "category": "Application / Safety", "owner": "Prime", "title": "Distress / safety mishandling", "severity": "Medium", "tracker_status": "Mitigated (locked)", "assessment": "watch", "confidence": 7, "phase": "1A", "threat": "A patient in distress messages a booking-only bot that mishandles it - reputational and real-world safety risk.", "blast": "Low-medium: reputation/safety, per incident.", "cause": "A booking bot is not a crisis service; any LLM-generated response to distress is unpredictable.", "solution": "Mitigated (D16, R10, X14): deterministic deflection guardrail + local emergency number. Residual uncertainty remains because edge phrasings are hard to fully cover - hence watchlist rather than closed. Periodically review deflection coverage against real transcripts.", "action": "Monitor: review distress-deflection coverage against real messages after launch."}, {"id": "SEC25", "source": "tracker", "category": "Compliance / Retention", "owner": "Prime + Legal", "title": "Data retention & right-to-erasure", "severity": "Medium", "tracker_status": "Mitigated (D62 retention + G62 cascade)", "assessment": "watch", "confidence": 7, "phase": "2C+", "threat": "Holding PHI longer than needed, or being unable to honor an erasure request, is a long-term compliance liability.", "blast": "Medium: a growing long-term PHI exposure surface.", "cause": "Retention/erasure depend on scheduled jobs and a cascade that are not built yet, plus a legal review (X20) still open.", "solution": "Designed (D62 retention + G62 cascade purge, right-to-erasure via opt-out chokepoint, consent capture G63). Confidence is held at 7 until the purge cascade is implemented and local-counsel review (X20) confirms the retention policy. Close X20 and ship/test the cascade to raise this.", "action": "Monitor: close X20 (counsel review) and verify the G62 purge cascade once built."}, {"id": "R10", "source": "risk", "category": "Risk Register", "owner": "", "title": "Bot mis-handles a distress message (booking-only clinics)", "severity": "Medium", "tracker_status": "Reduced — minimal deflection guardrail; clinic sign-off (X14)", "assessment": "watch", "confidence": 7, "phase": "", "threat": "Distress handling - minimal deflection guardrail (see SEC21).", "blast": "", "cause": "", "solution": "Distress handling - minimal deflection guardrail (see SEC21).", "action": "", "lightweight": true}, {"id": "R4", "source": "risk", "category": "Risk Register", "owner": "", "title": "App-layer encryption breaks SQL filtering", "severity": "Low", "tracker_status": "De-risked & locked: separate stable HMAC key; DAL lookups; ciphertext never in WHERE", "assessment": "holds", "confidence": 9, "phase": "", "threat": "De-risked & locked: separate stable HMAC (see SEC03).", "blast": "", "cause": "", "solution": "De-risked & locked: separate stable HMAC (see SEC03).", "action": "", "lightweight": true}, {"id": "R5", "source": "risk", "category": "Risk Register", "owner": "", "title": "RLS cross-tenant carve-out done wrong → isolation leak", "severity": "Low", "tracker_status": "De-risked & locked: named admin role + withAdminContext() + allowlist + audit", "assessment": "holds", "confidence": 9, "phase": "", "threat": "De-risked & locked: named admin role + withClinicContext (see SEC01).", "blast": "", "cause": "", "solution": "De-risked & locked: named admin role + withClinicContext (see SEC01).", "action": "", "lightweight": true}, {"id": "CODE-03", "source": "code", "category": "Config / Build hygiene", "owner": "Alpha", "title": "Mock layer (MSW) and mock token must never ship to production", "severity": "Low", "tracker_status": "Scaffold - monitor", "assessment": "holds", "confidence": 8, "phase": "0", "file": "monorepo/apps/web/src/config/env.ts", "threat": "If the MSW mock service worker or the dev-only mock bearer token were bundled/active in production, the panel could serve fabricated auth/session data or expose a bypass.", "blast": "Low: dev/staging confusion or a fake-session bypass if mocks leaked to prod.", "cause": "Mock-first development bakes a mock layer into the web app; correctness depends on the prod flag.", "solution": "Already handled correctly: MOCKING_ENABLED is false when NODE_ENV === 'production' unless explicitly enabled (apps/web/src/config/env.ts). Keep it that way - add a build-time assertion/test that the mock SW and mock data are tree-shaken/absent from the production bundle, and never set NEXT_PUBLIC_API_MOCKING=enabled in a prod env.", "action": "Monitor: add a CI check that the production web bundle contains no MSW worker / mock handlers."}, {"id": "CODE-05", "source": "code", "category": "Auth / Secrets", "owner": "Prime", "title": "JWT_SECRET minimum length is only 16 chars", "severity": "Low", "tracker_status": "Scaffold - new at 62bae10", "assessment": "action", "confidence": 8, "phase": "0", "file": "monorepo/packages/core/src/env.ts", "threat": "envSchema requires JWT_SECRET min 16 chars. For an HS256 signing key, 16 characters is the floor (~128 bits only if fully random; far less for a human passphrase). A short/low-entropy secret invites offline brute-force and session-token forgery.", "blast": "Medium if a weak secret is chosen: an attacker who recovers it can forge a valid session JWT for any user/clinic (clinicId is a JWT claim).", "cause": "Validation enforces presence and a 16-char floor but not high entropy or a 32+ length, while MASTER_KEY/HMAC_KEY already require min 32 - an inconsistency.", "solution": "Raise the JWT_SECRET minimum to 32 chars to match MASTER_KEY/HMAC_KEY, and document that it must be a high-entropy random value (e.g. `openssl rand -base64 32`), not a passphrase. Trivial, high-confidence hardening with token-forgery payoff.", "action": "Bump JWT_SECRET min length to 32 in env.ts and require a random value."}, {"id": "R1", "source": "risk", "category": "Risk Register", "owner": "", "title": "Meta asset transfer / WhatsApp setup (already verified, same entity)", "severity": "Low", "tracker_status": "Largely retired — routine; clinic-owned", "assessment": "holds", "confidence": 8, "phase": "", "threat": "Largely tent", "assessment": "watch", "confidence": 7, "phase": "", "threat": "Template approval is clinic responsibility; Docmee may supply.", "blast": "", "cause": "", "solution": "Template approval is clinic responsibility; Docmee may supply.", "action": "", "lightweight": true}, {"id": "R13", "source": "risk", "category": "Risk Register", "owner": "", "title": "Bot patient-data mis-capture (extraction accuracy)", "severity": "Low", "tracker_status": "Accepted/mitigated — confidence-gating (verified vs suggested), secretary-edits-win, per-field source, no deletes, full audit; tune on real traffic", "assessment": "watch", "confidence": 7, "phase": "", "threat": "Accepted/mitigated - confidence-gating on extraction accuracy.", "blast": "", "cause": "", "solution": "Accepted/mitigated - confidence-gating on extraction accuracy.", "action": "", "lightweight": true}, {"id": "CODE-02", "source": "code", "category": "Auth / Session (verified-good)", "owner": "Prime", "title": "API auth scaffold follows secure patterns", "severity": "Info", "tracker_status": "Scaffold - verified", "assessment": "holds", "confidence": 9, "phase": "0", "file": "monorepo/apps/api/src/auth/token.ts", "threat": "(Positive finding.) No issue: the API auth scaffold already implements the right controls and is worth protecting from regression.", "blast": "n/a - confirms the tenant-identity chokepoint is sound.", "cause": "Deliberate secure scaffolding by Prime.", "solution": "Confirmed good: HS256 JWT with 8h expiry; clinicId carried in the token and never read from the request (apps/api/src/plugins/auth.ts is the single authenticate chokepoint); verifySessionToken throws a generic UnauthorizedError that never leaks the failure reason; claims are zod-validated. Keep these invariants under test so a future change cannot silently weaken them.", "action": "No fix needed; add/keep tests asserting clinicId is never sourced from the request and that 401s stay generic."}], "action_plan": [{"id": "SEC06", "source": "tracker", "category": "Third-Party / Data Egress", "owner": "Prime + Legal", "title": "PHI sent to third-party LLM / ASR providers", "severity": "High", "tracker_status": "Open - review needed", "assessment": "action", "confidence": 9, "phase": "1A", "threat": "Protected health information (patient names, symptoms, voice notes) is forwarded to external LLM and speech-to-text processors. Without a signed data-processing agreement and a no-training guarantee, that PHI can be retained, used to train models, or sub-processed beyond Docmee's control - a data-protection and confidentiality breach.", "blast": "Systemic per provider: every clinic's prompted PHI flowing through the shared provider account. Not a single session - the exposure is the whole inbound stream that reaches the model/ASR.", "cause": "LLM/ASR are inherently external processors and PHI minimization is a build-time discipline that is not yet enforced. No DPA / no-train terms are confirmed (SEC06 is the one open SEC06 decision called out in SPRINT-0).", "solution": "Close the SEC06 decision before any real patient traffic: (1) sign provider DPAs with explicit no-training + retention-limit terms; (2) minimize PHI in prompts - strip/tokenize identifiers, send only what the KB-grounded answer needs; (3) for sensitive clinics, offer the self-hosted LLM path (FI2). Gate Phase 1A go-live on this.", "action": "Resolve the SEC06 provider decision (DPA + no-train) and add a PHI-minimization checklist to the prompt-builder before 1A ships."}, {"id": "SEC14", "source": "tracker", "category": "Infrastructure / Backups", "owner": "Prime / Ops", "title": "Backup security - PHI in backups", "severity": "High", "tracker_status": "Open - X12 before real patients", "assessment": "action", "confidence": 9, "phase": "0 / Pilot Gate", "threat": "Database/file backups contain decrypted-recoverable PHI. Unencrypted or loosely-permissioned backups are a classic exfiltration target - stealing a backup yields the entire patient corpus with none of the app-layer access controls.", "blast": "Catastrophic: a single backup artifact = all clinics' PHI at rest, outside RLS and outside the app's audit trail.", "cause": "Single-VPS deployment with backups not yet hardened. No confirmed encryption-at-rest for backups, access control, or tested recovery (tracked as X12, explicitly required before real patients).", "solution": "Implement X12 before the Pilot Gate: encrypt backups at rest (separate key from the live envelope key), store off-host with least-privilege access, log every access, and run a tested restore drill. Treat 'tested recovery' as a hard gate item, not a checkbox.", "action": "Land X12 (encrypted, access-controlled, restore-tested backups) and make it a blocking Pilot-Launch-Gate criterion."}, {"id": "SEC04", "source": "tracker", "category": "Third-Party / Transport", "owner": "Prime", "title": "PHI through unofficial WhatsApp gateway (Evolution)", "severity": "High", "tracker_status": "Mitigated (interim); cutover planned", "assessment": "action", "confidence": 9, "phase": "1A / 2B", "threat": "Routing patient messages through the unofficial Evolution gateway places PHI in transit through software outside Meta's official, supported path - higher risk of interception, instability, or account action, and weaker security assurances than the Cloud API.", "blast": "High: WhatsApp PHI in transit for every clinic still on the interim gateway.", "cause": "Evolution is a deliberate, bounded interim to unblock WhatsApp before official Meta Cloud API onboarding completes per clinic.", "solution": "Keep the interim strictly bounded and supervised, and execute the per-clinic cutover to the official Meta Cloud API (R7, X9/X10) on a defined timeline. Track each clinic's cutover state; do not let 'interim' become permanent.", "action": "Hold the cutover schedule (X9/X10) and surface per-clinic gateway status so no clinic runs on Evolution past its bound."}, {"id": "SEC16", "source": "tracker", "category": "Compliance / Logging", "owner": "Prime + Alpha", "title": "PHI in logs / URLs", "severity": "Medium-High", "tracker_status": "Open - build-time discipline", "assessment": "action", "confidence": 9, "phase": "all", "threat": "PHI leaking into application logs, error traces, or URL query strings. Logs are widely readable (ops, aggregators, third-party log SaaS) and URLs end up in browser history, proxies, and referer headers - turning a low-privilege surface into a PHI disclosure.", "blast": "Medium and cross-cutting: anyone with log access, plus any intermediary that sees URLs. Grows with every new endpoint and log line that is not disciplined.", "cause": "A sanctioned redacting logger now exists (packages/core/src/logger.ts - pino with redact paths for password/token/authorization/secret/phone/content/body/email/special_notes/raw_payload, plus a no-console lint), which closes the biggest gap. Residual: redaction covers only top-level and one-level-nested keys (paths = key and *.key), so deeply-nested PHI, PHI inside arrays, PHI passed as a free-text log message, and PHI in URLs/query strings are still not covered structurally.", "solution": "Build on the new logger rather than start over: (1) extend redaction to arbitrary depth/arrays (pino wildcard paths or a serializer that walks objects) - see CODE-04; (2) keep all identifiers out of URLs/query strings and add a CI/lint check for PHI-in-URL; (3) enforce by review that raw patient content is never the log message, since key-based redaction cannot catch free-text. The logger + no-console lint is a strong base and meaningfully reduces this from where it was.", "action": "Deepen logger redaction (CODE-04) + add a PHI-in-URL CI check; the core redaction control already landed in logger.ts (62bae10)."}, {"id": "SEC13", "source": "tracker", "category": "Infrastructure", "owner": "Ops", "title": "Single-VPS host compromise", "severity": "Medium-High", "tracker_status": "Partial - hardening needed", "assessment": "action", "confidence": 8, "phase": "0 / Pilot Gate", "threat": "Everything runs on one VPS: API, worker, DB, keys. Host compromise (unpatched service, weak SSH, over-broad privileges) yields the entire deployment - app controls and RLS are irrelevant once you own the box.", "blast": "Catastrophic for the deployment: all clinics, all PHI, all keys on a single host.", "cause": "Single-node topology (redundancy deferred to X13) with host hardening only partially done.", "solution": "Harden now even though redundancy is later: least-privilege OS users, locked-down SSH (keys only, no root login), automated patch management, a host firewall exposing only 443, and encrypted backups (X12). Plan the second node / redundancy (X13, R8) post-pilot, but the hardening is a pilot prerequisite.", "action": "Complete host hardening + patch automation before pilot; keep X13 redundancy on the post-pilot roadmap."}, {"id": "SEC17", "source": "tracker", "category": "Auth / Session", "owner": "Prime + Alpha", "title": "JWT / session security", "severity": "Medium-High", "tracker_status": "Locked (scope) + build discipline", "assessment": "action", "confidence": 8, "phase": "0", "threat": "Weak session handling - long-lived or broadly-scoped JWTs, tokens readable by client JS, no rotation/revocation on role change - lets a stolen token be replayed for its full lifetime, escalating a single XSS or leak into sustained account access.", "blast": "Medium: a single user/clinic session per stolen token; broader if many tokens share a weakness.", "cause": "Real credential exchange is not built yet (Sprint-0 is mock-first). The scaffold already does the right things (HS256, 8h expiry, clinicId only from the token, generic 401), but token storage and revocation are still to land - see CODE-01.", "solution": "When real /auth/login lands in Phase 0: set the session cookie server-side as HttpOnly + Secure + SameSite (so JS cannot read it - closes CODE-01), keep JWTs short-lived and scoped, rotate on privilege change, and add a revocation path (deny-list or short TTL + refresh). The verify/claims discipline already in token.ts is a good base.", "action": "At Phase-0 real auth: move the token to a server-set HttpOnly cookie and add rotate/revoke-on-role-change."}, {"id": "SEC22", "source": "tracker", "category": "Supply Chain", "owner": "Prime + Alpha", "title": "Dependency / supply-chain vulnerability", "severity": "Medium", "tracker_status": "Open - recommended", "assessment": "action", "confidence": 9, "phase": "Sprint 0+", "threat": "A vulnerable or malicious npm/pip dependency (or a compromised Evolution gateway build) executes code in the API/worker - the supply-chain route to RCE and credential/PHI theft that bypasses every app-layer control.", "blast": "Medium-to-high: a transitive dep running in the API process inherits its secrets and DB access. With a single VPS, that is effectively host-level.", "cause": "No automated vulnerability scanning or update cadence wired into CI yet. Lockfiles exist (pnpm-lock.yaml present - good) but are not yet paired with audit gating or Dependabot, and the Evolution version is not pinned/vetted.", "solution": "Cheap, high-value, and actionable today: add `pnpm audit` / `pip audit` to CI as a failing gate on high/critical, enable Dependabot (or Renovate) with a review cadence, pin and periodically re-vet the Evolution gateway version, and consider provenance checks. This is the lowest-effort item with real RCE-class payoff.", "action": "Wire dependency vuln-scanning into .github/workflows/ci.yml and enable automated update PRs this sprint."}, {"id": "SEC18", "source": "tracker", "category": "Network / Availability", "owner": "Prime", "title": "API rate limiting / DoS", "severity": "Medium", "tracker_status": "Open - recommended", "assessment": "action", "confidence": 8, "phase": "Pilot Gate", "threat": "No per-source rate limiting means a flood of requests or junk webhooks can exhaust the single VPS, and unauthenticated webhook endpoints can be abused to drive queue/work amplification - an availability (and cost) attack.", "blast": "Medium: availability of the whole single-node deployment; degraded service for every clinic at once.", "cause": "Rate limiting and webhook early-drop are not yet implemented; the architecture is single-VPS so there is no upstream shield.", "solution": "Add per-source rate limiting at the edge/app, drop invalid webhooks before signature-heavy work (cheap checks first), and apply queue backpressure so a spike cannot unbounded-grow the worker backlog. Scope for the Pilot Launch Gate (SEC18 is already slated there).", "action": "Implement per-source rate limiting + webhook early-drop as a Pilot-Gate item."}, {"id": "R3", "source": "risk", "category": "Compliance / Legal", "owner": "Clinic + Docmee", "title": "Legal docs (privacy policy, terms, Spanish)", "severity": "Medium", "tracker_status": "Open - clinic-owned; Docmee supplies templates", "assessment": "action", "confidence": 8, "phase": "Pilot Gate", "threat": "Operating a PHI-handling platform without a published privacy policy / terms (in Spanish for Guatemala) is a direct legal/compliance exposure and undermines consent capture (G63).", "blast": "Medium: regulatory/legal exposure across all clinics on the platform; blocks lawful processing.", "cause": "Legal docs are clinic-owned but not yet produced; consent flows reference them.", "solution": "Docmee should supply Spanish-language privacy-policy and terms templates and make publishing them a Pilot-Gate prerequisite for each clinic. Tie consent capture (G63) to the published policy.", "action": "Ship the Spanish legal templates and gate pilot onboarding on a published policy."}, {"id": "R8", "source": "risk", "category": "Infrastructure / Availability", "owner": "Ops", "title": "Single-VPS = single point of failure", "severity": "Medium", "tracker_status": "Redundancy deferred (X13); backups REQUIRED", "assessment": "action", "confidence": 8, "phase": "Pilot Gate / post-pilot", "threat": "One VPS means any host failure (hardware, disk, bad deploy) takes down all clinics, and without solid backups a disk loss is unrecoverable PHI loss.", "blast": "High: full-deployment outage; with weak backups, permanent data loss.", "cause": "Single-node topology chosen for pilot economics; redundancy deferred to X13.", "solution": "Accept the deferral but make backups non-negotiable before pilot (overlaps SEC14): encrypted, off-host, restore-tested. Put X13 (redundancy/second node) on the immediate post-pilot roadmap and define an RTO/RPO.", "action": "Make tested backups a Pilot-Gate blocker; schedule X13 redundancy for post-pilot with a stated RTO/RPO."}, {"id": "CODE-01", "source": "code", "category": "Auth / Session (XSS)", "owner": "Alpha + Prime", "title": "Session token in a non-HttpOnly cookie (JS-readable)", "severity": "Medium", "tracker_status": "Scaffold - Sprint-0 mock", "assessment": "action", "confidence": 8, "phase": "0", "file": "monorepo/apps/web/src/lib/auth.ts", "threat": "The session bearer token is written via document.cookie (apps/web/src/lib/auth.ts setToken), so the cookie is NOT HttpOnly and is readable by any JavaScript. A single XSS anywhere in the panel can exfiltrate the token and replay the session for its 8h lifetime. Cross-references SEC17.", "blast": "Medium: one user/clinic session per stolen token; systemic if an XSS affects many users.", "cause": "Sprint-0 is mock-first with no server credential exchange, so the token is set client-side - and a client-set cookie cannot be HttpOnly by definition. The code does do SameSite=Lax + Secure-in-prod, which is good but does not stop same-origin JS from reading it.", "solution": "When the real /auth/login lands (Phase 0), issue the cookie from the server with HttpOnly + Secure + SameSite=Lax/Strict and a Set-Cookie response, so JS can never read it. Until then, treat the JS-readable token as an accepted scaffold limitation and keep the panel XSS-clean (React escaping by default; avoid dangerouslySetInnerHTML). This is the concrete server-side fix behind SEC17.", "action": "At Phase-0 real auth, switch setToken to a server-set HttpOnly Set-Cookie; remove client-side token writes."}, {"id": "CODE-04", "source": "code", "category": "Logging / PHI (SEC16)", "owner": "Prime", "title": "Log redaction covers only shallow keys (one level deep)", "severity": "Medium", "tracker_status": "Scaffold - new at 62bae10", "assessment": "action", "confidence": 8, "phase": "0", "file": "monorepo/packages/core/src/logger.ts", "threat": "The sanctioned pino logger redacts sensitive keys only at the top level and one level of nesting (REDACT_PATHS = `key` and `*.key`). PHI nested deeper (a patient object inside a payload inside an event), inside arrays, or passed as the free-text log message is NOT redacted and will be written in clear. This is the residual half of SEC16 after the good redaction work in this commit.", "blast": "Medium: PHI in logs for any path that logs deep/nested structures or raw message strings; readable by anyone with log/aggregator access.", "cause": "pino redact paths are explicit and shallow here, and key-name redaction by design cannot catch PHI embedded inside a message string.", "solution": "Extend redaction to arbitrary depth and arrays (additional pino wildcard paths or a custom serializer that walks objects before logging), and enforce by convention/review that raw patient content is never passed as the log message. Add a unit test that logs a deeply-nested PHI object and asserts every sensitive field is `[redacted]`. The existing logger is the right foundation - this just hardens its depth.", "action": "Deepen logger redaction beyond one level + add a redaction unit test for nested/array PHI."}, {"id": "R7", "source": "risk", "category": "Risk Register", "owner": "", "title": "Unofficial WhatsApp gateway (Evolution) for interim/live traffic", "severity": "Medium", "tracker_status": "Accepted cope creep.", "blast": "", "cause": "", "solution": "Doc-ingestion scope risk; mitigated to text-layer, off-the-shelf - monitor scope creep.", "action": "", "lightweight": true}, {"id": "SEC21", "source": "tracker", "category": "Application / Safety", "owner": "Prime", "title": "Distress / safety mishandling", "severity": "Medium", "tracker_status": "Mitigated (locked)", "assessment": "watch", "confidence": 7, "phase": "1A", "threat": "A patient in distress messages a booking-only bot that mishandles it - reputational and real-world safety risk.", "blast": "Low-medium: reputation/safety, per incident.", "cause": "A booking bot is not a crisis service; any LLM-generated response to distress is unpredictable.", "solution": "Mitigated (D16, R10, X14): deterministic deflection guardrail + local emergency number. Residual uncertainty remains because edge phrasings are hard to fully cover - hence watchlist rather than closed. Periodically review deflection coverage against real transcripts.", "action": "Monitor: review distress-deflection coverage against real messages after launch."}, {"id": "SEC25", "source": "tracker", "category": "Compliance / Retention", "owner": "Prime + Legal", "title": "Data retention & right-to-erasure", "severity": "Medium", "tracker_status": "Mitigated (D62 retention + G62 cascade)", "assessment": "watch", "confidence": 7, "phase": "2C+", "threat": "Holding PHI longer than needed, or being unable to honor an erasure request, is a long-term compliance liability.", "blast": "Medium: a growing long-term PHI exposure surface.", "cause": "Retention/erasure depend on scheduled jobs and a cascade that are not built yet, plus a legal review (X20) still open.", "solution": "Designed (D62 retention + G62 cascade purge, right-to-erasure via opt-out chokepoint, consent capture G63). Confidence is held at 7 until the purge cascade is implemented and local-counsel review (X20) confirms the retention policy. Close X20 and ship/test the cascade to raise this."   segments.forEach(seg=>{const sweep=seg.value/tot*359.999;if(seg.value<=0)return;s.appendChild(elns("path",{d:arc(cx,cy,r,a,a+sweep),fill:"none",stroke:seg.color,"stroke-width":18}));a+=sweep;});
  s.appendChild(elns("text",{x:cx,y:cy-2,"text-anchor":"middle","font-size":26,"font-weight":800,fill:"#e8eef8"},tot));
  s.appendChild(elns("text",{x:cx,y:cy+16,"text-anchor":"middle","font-size":10,fill:"#8a9bb8"},"findings"));return s;}
function hbars(rows){const max=Math.max(...rows.map(r=>r.value),1);const w=520,rh=26,hh=rows.length*rh+6;
  const s=elns("svg",{viewBox:`0 0 ${w} ${hh}`,width:"100%",height:hh});
  rows.forEach((r,i)=>{const y=i*rh+4,bw=(w-160)*r.value/max;
    s.appendChild(elns("text",{x:0,y:y+15,"font-size":12,fill:"#8a9bb8"},r.label));
    s.appendChild(elns("rect",{x:130,y:y+3,width:w-160,height:14,rx:7,fill:"#1b2740"}));
    s.appendChild(elns("rect",{x:130,y:y+3,width:Math.max(2,bw),height:14,rx:7,fill:r.color}));
    s.appendChild(elns("text",{x:w-18,y:y+15,"font-size":12,"font-weight":700,fill:"#e8eef8","text-anchor":"end"},r.value));});
  return s;}
function confBars(hist){const keys=[...Array(11).keys()];const max=Math.max(...keys.map(k=>hist[k]||0),1);
  const w=520,h=160,base=h-26,bw=(w-20)/11-8;const s=elns("svg",{viewBox:`0 0 ${w} ${h}`,width:"100%",height:h});
  keys.forEach(k=>{const v=hist[k]||0;const x=10+k*((w-20)/11);const bh=v/max*(base-14);
    const col=k>=8?"var(--done)":k>=5?"var(--doing)":"var(--crit)";
    s.appendChild(elns("rect",{x,y:base-bh,width:bw,height:Math.max(v?3:0,bh),rx:4,fill:col}));
    if(v)s.appendChild(elns("text",{x:x+bw/2,y:base-bh-5,"text-anchor":"middle","font-size":11,"font-weight":700,fill:"#e8eef8"},v));
    s.appendChild(elns("text",{x:x+bw/2,y:base+14,"text-anchor":"middle","font-size":10,fill:"#8a9bb8"},k));});
  s.appendChild(elns("line",{x1:10,y1:base,x2:w-10,y2:base,stroke:"#22304a"}));
  return s;}

/* ---- finding card (four-part framework) ---- */
function findingCard(f){
  const c=h(`<div class="finding sev-${(f.severity||'Medium').replace(/ /g,'-')}"></div>`);
  const conf=parseInt(f.confidence||0);
  c.appendChild(h(`<div class="fhead">
    <span class="fid">${esc(f.id)}</span>
    <span class="ftitle">${esc(f.title)}</span>
    <span class="spacer"></span>
    <span class="conf ${confClass(conf)}">conf <span class="n">${conf}</span>/10</span>
    <span class="chip ${sevClass(f.severity)}">${esc(f.severity||'')}</span>
    <span class="chip ${assessClass(f.assessment)}">${assessLabel(f.assessment)}</span>
  </div>`));
  const meta=[];
  if(f.category)meta.push(`<span><b>${esc(f.category)}</b></span>`);
  if(f.owner)meta.push(`<span>owner: ${esc(f.owner)}</span>`);
  if(f.phase)meta.push(`<span>phase: ${esc(f.phase)}</span>`);
  if(f.file)meta.push(`<span>file: <code>${esc(f.file)}</code></span>`);
  if(f.tracker_status)meta.push(`<span>tracker: ${esc(f.tracker_status)}</span>`);
  c.appendChild(h(`<div class="fmeta">${meta.join("")}</div>`));
  if(!f.lightweight){
    c.appendChild(h(`<div class="quad">
      <div class="q threat"><h5>1 - Potential Threat</h5><p>${esc(f.threat)}</p></div>
      <div class="q blast"><h5>2 - Blast Radius</h5><p>${esc(f.blast)}</p></div>
      <div class="q cause"><h5>3 - Cause</h5><p>${esc(f.cause)}</p></div>
      <div class="q sol"><h5>4 - Potential Solution</h5><p>${esc(f.solution)}</p></div>
    </div>`));
  } else {
    c.appendChild(h(`<div class="quad"><div class="q"><p>${esc(f.threat)}</p></div></div>`));
  }
  if(f.action)c.appendChild(h(`<div class="faction"><b>&#9656; Recommended next step:</b> ${esc(f.action)}</div>`));
  return c;
}

/* ---- header + banners ---- */
function renderHeader(){
  document.getElementById("tagline").textContent=DATA.project.tagline;

    `<div><span class="pill live">&#9679; ${DATA.headline.action} action item(s) &#8805; conf 8</span></div>`+

    `<div style="margin-top:6px">Audited ${esc(fr.audit_date)} @ ${esc(fr.audit_head)} &middot; data refreshed ${esc(DATA.generated)}</div>`+

    `<button class="arbtn" id="ar-now" title="Reload now">&#8635;</button><span class="arcd" id="ar-cd"></span></div>`;
  setupAutoRefresh();

  const b=document.getElementById("banners");b.innerHTML="";
  if(fr.code_changed_since_audit || fr.be_fe_files>0){
    let msg=`<b>&#9888; Code changed since the last deep AI audit.</b> `;
    if(fr.code_changed_since_audit)msg+=`monorepo HEAD is <b>${esc(fr.monorepo_head)}</b> vs audit <b>${esc(fr.audit_head)}</b>. `;
    if(fr.be_fe_files>0)msg+=`Backend/Frontend now holds <b>${fr.be_fe_files}</b> code file(s). `;
    msg+=`The data + heuristic scan below are current, but the AI findings reflect the audited commit &mdash; <b>request a deep re-audit</b> (see footer) to refresh confidence ratings.`;
    b.appendChild(h(`<div class="banner warn">${msg}</div>`));
  }
  if(DATA.headline.drift>0){
    b.appendChild(h(`<div class="banner warn"><b>&#9888; ${DATA.headline.drift} tracker status change(s)</b> since audit &mdash; see the Code &amp; Scan tab. A finding's recommended action may no longer match the tracker.</div>`));
  }
  if(DATA.headline.unanalyzed>0){
    b.appendChild(h(`<div class="banner warn"><b>&#9888; ${DATA.headline.unanalyzed} new tracker item(s)</b> not yet analyzed &mdash; see the Code &amp; Scan tab. Re-audit to cover them.</div>`));
  }

    b.appendChild(h(`<div class="banner ok"><b>&#10003; In sync.</b> AI findings match the audited commit; no tracker drift and no unanalyzed items detected this run.</div>`));
  }
  document.getElementById("foot").innerHTML=
    `Source: <b>findings.json</b> (authored AI analysis) cross-checked against <b>docmee-trackers.xlsx</b> + live code scan + monorepo git.<br>`+
    `Mechanical refresh (data + scan): <code>python build_security_dashboard.py</code> &mdash; runs hourly via the scheduled task. `+
    `Deep AI re-audit (refresh confidence/ratings on new BE/FE code): re-run the security advisor, which rewrites findings.json.`;
}

const TABS=[["overview","Overview",()=>""],["plan","Action Plan",()=>DATA.headline.action],
            ["findings","All Findings",()=>DATA.headline.total],["code","Code & Scan",()=>DATA.headline.code_hits],
            ["watch","Watchlist",()=>DATA.headline.watchlist]];
let CURRENT="overview";
function renderTabs(){const nav=document.getElementById("tabs");nav.innerHTML="";
  TABS.forEach(([id,label,cnt])=>{const b=document.createElement("button");
    b.innerHTML=label+(cnt()!==""?`<span class="cnt">${cnt()}</span>`:"");b.className=id===CURRENT?"active":"";
    b.onclick=()=>{CURRENT=id;show();};nav.appendChild(b);});}
function show(){TABS.forEach(([id])=>document.getElementById("view-"+id).classList.add("hidden"));
  document.getElementById("view-"+CURRENT).classList.remove("hidden");renderTabs();window.scrollTo({top:0,behavior:"smooth"});}

  const charts=h(`<div class="charts"></div>`);

  const left=h(`<div class="panel"><h2>Top action items <span class="tag">highest severity, confidence &#8805; 8</span></h2><p class="desc">Full four-part detail on the Action Plan tab.</p></div>`);

      <span class="fid">${esc(f.id)}</span><span style="flex:1;font-size:13px">${esc(f.title)}</span>
      <span class="chip ${sevClass(f.severity)}">${esc(f.severity)}</span>
      <span class="conf ${confClass(parseInt(f.confidence))}">${f.confidence}</span></div>`));
  });
  row.appendChild(left);
  const right=h(`<div class="panel"><h2>Repository</h2><p class="desc">monorepo &middot; branch <b>${esc(DATA.git.branch)}</b></p>
     <div class="scroll" style="max-height:230px"><table><thead><tr><th>Commit</th><th>Date</th><th>Subject</th></tr></thead><tbody id="ov-c"></tbody></table></div></div>`);

/* ---- CODE & SCAN ---- */
function viewCode(){
  const root=document.getElementById("view-code");root.innerHTML="";
  const fr=DATA.freshness;
  const top=h(`<div class="panel"><h2>Live code scan <span class="tag">heuristic patterns &middot; re-run every refresh</span></h2>
    <p class="desc">Scanned <b>${fr.files_scanned}</b> source files across monorepo apps/packages, Backend, and Frontend.
    Counts are <b>signals to review</b>, not confirmed vulnerabilities. Dir file counts:
    apps=${DATA.dir_counts.apps||0}, packages=${DATA.dir_counts.packages||0},
    Backend=${DATA.dir_counts.Backend||0}, Frontend=${DATA.dir_counts.Frontend||0}.</p>
    <div class="scroll" style="max-height:none"><table><thead><tr><th>Pattern</th><th>Hits</th><th>Files (sample)</th></tr></thead><tbody id="sc"></tbody></table></div></div>`);
  root.appendChild(top);
  const sb=top.querySelector("#sc");
  DATA.scan.forEach(s=>{
    const cls=s.count>0?(s.label.includes("Console")?"c-watch":"c-action"):"c-holds";
    sb.appendChild(h(`<tr><td>${esc(s.label)}</td><td><span class="chip ${cls}">${s.count}</span></td>
      <td><div class="filelist">${s.files.map(esc).join("<br>")||'&mdash;'}</div></td></tr>`));
  });

  // code findings (AI-authored)
  const cf=DATA.findings.filter(f=>f.source==="code");
  const cp=h(`<div class="panel" style="margin-top:16px"><h2>Code findings <span class="tag">AI-authored, from reading the scaffold</span></h2><div id="cfb"></div></div>`);
  root.appendChild(cp);
  const cfb=cp.querySelector("#cfb");
  if(!cf.length)cfb.appendChild(h(`<p class="muted">No code findings yet.</p>`));
  cf.forEach(f=>cfb.appendChild(findingCard(f)));

  // drift + unanalyzed
  const dr=h(`<div class="two" style="margin-top:16px"></div>`);
  const d1=h(`<div class="panel"><h2>Tracker drift <span class="tag">status changed since audit</span></h2></div>`);
  if(DATA.drift.length){const t=h(`<div class="scroll" style="max-height:none"><table><thead><tr><th>ID</th><th>Was (audited)</th><th>Now (tracker)</th></tr></thead><tbody></tbody></table></div>`);
    const tb=t.querySelector("tbody");DATA.drift.forEach(d=>tb.appendChild(h(`<tr><td><b>${esc(d.id)}</b> ${esc(d.title)}</td><td class="muted">${esc(d.was)}</td><td><span class="chip c-watch">${esc(d.now)}</span></td></tr>`)));d1.appendChild(t);}
  else d1.appendChild(h(`<p class="muted">No drift &mdash; audited statuses match the live tracker.</p>`));
  dr.appendChild(d1);
  const d2=h(`<div class="panel"><h2>Unanalyzed tracker items <span class="tag">no finding yet</span></h2></div>`);
  if(DATA.unanalyzed.length){const t=h(`<div class="scroll" style="max-height:none"><table><thead><tr><th>ID</th><th>Kind</th><th>Title</th></tr></thead><tbody></tbody></table></div>`);
    const tb=t.querySelector("tbody");DATA.unanalyzed.forEach(u=>tb.appendChild(h(`<tr><td><b>${esc(u.id)}</b></td><td class="muted">${esc(u.kind)}</td><td>${esc(u.title)}</td></tr>`)));d2.appendChild(t);}
  else d2.appendChild(h(`<p class="muted">All tracker security + risk items have a finding.</p>`));
  dr.appendChild(d2);root.appendChild(dr);
}

/* ---- WATCHLIST ---- */
function viewWatch(){
  const root=document.getElementById("view-watch");root.innerHTML="";
  const p=h(`<div class="panel"><h2>Watchlist <span class="tag">confidence &lt; 8 &mdash; real, but not yet action-plan grade</span></h2>
    <p class="desc">These are genuine items I am deliberately <b>not</b> putting in the action plan: either residual uncertainty, dependence on code not yet built, or a legal/external input still open. Shown for transparency so nothing is silently dropped.</p>
    <div id="wb"></div></div>`);
  root.appendChild(p);
  const box=p.querySelector("#wb");
  if(!DATA.watchlist.length)box.appendChild(h(`<p class="muted">Nothing on the watchlist.</p>`));
  DATA.watchlist.forEach(f=>box.appendChild(findingCard(f)));
}

/* ---- auto-refresh (reloads the regenerated file) ---- */
const ARKEY="sec-dashboard-ar";const AR_OPTS=[300,900,1800,3600];
let AR;try{AR=JSON.parse(localStorage.getItem(ARKEY));}catch(e){}
if(!AR||typeof AR.on!=="boolean")AR={on:false,sec:3600};
let arLeft=AR.sec,arTimer=null;
function fmtSec(s){return s<3600?(s/60)+"m":(s/3600)+"h";}
function setupAutoRefresh(){
  const tg=document.getElementById("ar-toggle"),it=document.getElementById("ar-int"),nw=document.getElementById("ar-now"),cd=document.getElementById("ar-cd");
  function paint(){tg.textContent=(AR.on?"● ":"○ ")+"Auto-reload "+(AR.on?"On":"Off");tg.className="arbtn "+(AR.on?"on":"off");
    it.textContent="every "+fmtSec(AR.sec);it.style.display=AR.on?"":"none";cd.textContent=AR.on?("reloads in "+Math.ceil(arLeft/60)+"m"):"";}
  function save(){localStorage.setItem(ARKEY,JSON.stringify(AR));}
  tg.onclick=()=>{AR.on=!AR.on;arLeft=AR.sec;save();paint();};
  it.onclick=()=>{AR.sec=AR_OPTS[(AR_OPTS.indexOf(AR.sec)+1)%AR_OPTS.length];arLeft=AR.sec;save();paint();};
  nw.onclick=()=>location.reload();
  if(arTimer)clearInterval(arTimer);
  arTimer=setInterval(()=>{if(!AR.on)return;arLeft--;if(arLeft<=0){location.reload();return;}paint();},1000);
  paint();
}

/* ---- boot ---- */
renderHeader();renderTabs();
viewOverview();viewPlan();viewFindings();viewCode();viewWatch();show();
</script>
